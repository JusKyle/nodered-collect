<script type="text/javascript">
  RED.nodes.registerType('data-output', {
    category: 'collecting',
    color: '#8b5cf6',
    defaults: {
      name: { value: '' },
      mqttHost: { value: 'localhost' },
      mqttPort: { value: 1883 },
      topic: { value: 'collecting/data/#' }

    }
