<script type="text/javascript">
  RED.nodes.registerType('device-instance', {
    category: 'collecting',
    color: '#10b981',
    defaults: {
      name: { value: '' },
      deviceManager: { type: 'device-manager', required: true },
      deviceId: { value: '' },
      modelId: { value: '' },
      nodeId: { value: '' },
      config: { value: '{}' }

    inputs: 1,
    outputs: 1,
    icon: 'device.svg',
    label: function () {
      return this.name || 'Device Instance'
    },
    oneditprepare: function () {
    }
  })
