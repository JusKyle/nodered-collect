<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原型方向 v1 - 清爽运维台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { ink: '#17201a', moss: '#3f6b50', sage: '#eef5ef', line: '#dfe8e1', amber: '#d97706' }
        }
      }
    }
  </script>
  <style>
    body { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; }
    .nav-item.active { background: #eef5ef; color: #2f5a40; }
    .metric-card { box-shadow: 0 10px 26px rgba(23,32,26,.06); }
  </style>
</head>
<body class="bg-[#f7faf7] text-ink">
  <div class="min-h-screen grid grid-cols-[248px_1fr]">
    <aside class="bg-white border-r border-line px-4 py-5">
      <div class="flex items-center gap-3 px-2 mb-7">
        <div class="w-9 h-9 rounded-lg bg-moss text-white grid place-items-center"><i data-lucide="network"></i></div>
        <div><div class="font-semibold text-[15px]">Node-RED Collect</div><div class="text-xs text-slate-500">分布式采集平台</div></div>
      </div>
      <nav class="space-y-1 text-sm">
        <button class="nav-item active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg"><i data-lucide="layout-dashboard" class="w-4"></i>总览工作台</button>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600"><i data-lucide="server" class="w-4"></i>边缘网关</button>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600"><i data-lucide="cpu" class="w-4"></i>设备模型</button>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600"><i data-lucide="router" class="w-4"></i>设备实例</button>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600"><i data-lucide="send" class="w-4"></i>配置下发</button>
        <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600"><i data-lucide="database" class="w-4"></i>缓存与数据</button>
      </nav>
      <div class="mt-8 rounded-lg bg-sage border border-line p-3">
        <div class="text-xs text-slate-500">MQTT Broker</div>
        <div class="mt-2 flex items-center justify-between"><span class="font-medium">EMQX Online</span><span class="h-2.5 w-2.5 rounded-full bg-emerald-500"></span></div>
      </div>
    </aside>
    <main class="p-6">
      <header class="flex items-center justify-between mb-6">
        <div><h1 class="text-2xl font-semibold">总览工作台</h1><p class="text-sm text-slate-500 mt-1">50+ 网关与 500+ 设备实例的运行态势</p></div>
        <div class="flex items-center gap-2">
          <button class="h-9 px-3 rounded-lg border border-line bg-white text-sm flex items-center gap-2"><i data-lucide="refresh-cw" class="w-4"></i>刷新</button>
          <button class="h-9 px-3 rounded-lg bg-moss text-white text-sm flex items-center gap-2"><i data-lucide="rocket" class="w-4"></i>批量下发</button>
        </div>
      </header>
      <section class="grid grid-cols-4 gap-4 mb-5">
        <div class="metric-card bg-white rounded-lg border border-line p-4"><div class="text-xs text-slate-500">在线网关</div><div class="mt-3 text-3xl font-semibold">42</div><div class="mt-2 text-xs text-emerald-600">SSE 1 秒内同步</div></div>
        <div class="metric-card bg-white rounded-lg border border-line p-4"><div class="text-xs text-slate-500">设备实例</div><div class="mt-3 text-3xl font-semibold">518</div><div class="mt-2 text-xs text-slate-500">Modbus / S7 / OPC UA</div></div>
        <div class="metric-card bg-white rounded-lg border border-line p-4"><div class="text-xs text-slate-500">待下发配置</div><div class="mt-3 text-3xl font-semibold text-amber">16</div><div class="mt-2 text-xs text-amber">7 个网关涉及变更</div></div>
        <div class="metric-card bg-white rounded-lg border border-line p-4"><div class="text-xs text-slate-500">缓存积压</div><div class="mt-3 text-3xl font-semibold">1,284</div><div class="mt-2 text-xs text-slate-500">按 100 条/秒补发</div></div>
      </section>
      <section class="grid grid-cols-[1.45fr_.9fr] gap-4">
        <div class="bg-white rounded-lg border border-line p-4">
          <div class="flex items-center justify-between mb-3"><h2 class="font-semibold">网关性能趋势</h2><span class="text-xs text-slate-500">最近 24 小时</span></div>
          <div id="chart" class="h-[280px]"></div>
        </div>
        <div class="bg-white rounded-lg border border-line p-4">
          <div class="flex items-center justify-between mb-3"><h2 class="font-semibold">配置下发队列</h2><button class="text-sm text-moss">查看全部</button></div>
          <div class="space-y-3 text-sm">
            <div class="p-3 rounded-lg bg-sage border border-line"><div class="flex justify-between"><b>华东-锅炉房-01</b><span class="text-amber">下发中</span></div><div class="mt-2 h-2 rounded bg-white"><div class="h-2 rounded bg-moss w-2/3"></div></div></div>
            <div class="p-3 rounded-lg border border-line"><div class="flex justify-between"><b>西区-产线-07</b><span class="text-slate-500">排队</span></div><p class="mt-1 text-xs text-slate-500">版本 v18 → v19，12 个实例</p></div>
            <div class="p-3 rounded-lg border border-line"><div class="flex justify-between"><b>南站-能耗-03</b><span class="text-red-600">失败</span></div><p class="mt-1 text-xs text-slate-500">Node-RED Basic Auth 认证失败</p></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script>
    lucide.createIcons();
    const chart = echarts.init(document.getElementById('chart'));
    chart.setOption({ grid:{left:34,right:16,top:24,bottom:28}, tooltip:{trigger:'axis'}, xAxis:{type:'category',data:['00','04','08','12','16','20','24']}, yAxis:{type:'value'}, series:[{name:'CPU',type:'line',smooth:true,data:[22,28,36,31,42,37,29],areaStyle:{color:'rgba(63,107,80,.14)'},lineStyle:{color:'#3f6b50'}},{name:'内存',type:'line',smooth:true,data:[48,51,50,54,58,57,55],lineStyle:{color:'#d97706'}}] });
    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
