<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原型方向 v3 - 工业控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 0; background:#f3f4f1; color:#20231f; }
    .rail { background:#252923; }
    .tab.active { background:#ef6c22; color:#fff; }
    .panel { border:1px solid #d7d8d1; box-shadow: 0 1px 0 rgba(0,0,0,.04); }
  </style>
</head>
<body>
  <div class="min-h-screen grid grid-cols-[232px_1fr]">
    <aside class="rail text-white p-4">
      <div class="flex items-center gap-3 mb-6"><div class="w-10 h-10 rounded bg-[#ef6c22] grid place-items-center"><i data-lucide="workflow"></i></div><div><div class="font-semibold">NRC Platform</div><div class="text-xs text-white/50">Industrial Edge Ops</div></div></div>
      <div class="text-xs text-white/40 mb-2">MAIN</div>
      <nav class="space-y-1 text-sm">
        <button class="tab active w-full text-left px-3 py-2.5 rounded flex items-center gap-2"><i data-lucide="panel-top" class="w-4"></i>运行总览</button>
        <button class="tab w-full text-left px-3 py-2.5 rounded text-white/70 flex items-center gap-2"><i data-lucide="hard-drive" class="w-4"></i>网关资产</button>
        <button class="tab w-full text-left px-3 py-2.5 rounded text-white/70 flex items-center gap-2"><i data-lucide="boxes" class="w-4"></i>模型与实例</button>
        <button class="tab w-full text-left px-3 py-2.5 rounded text-white/70 flex items-center gap-2"><i data-lucide="git-compare" class="w-4"></i>下发同步</button>
      </nav>
      <div class="mt-8 rounded bg-white/8 border border-white/10 p-3 text-xs text-white/70">系统级缓存：关闭<br/>默认补发速率：100 条/秒</div>
    </aside>
    <main>
      <header class="h-16 bg-white border-b border-[#d7d8d1] px-6 flex items-center justify-between">
        <div class="flex items-center gap-3"><h1 class="text-xl font-semibold">运行总览</h1><span class="text-xs px-2 py-1 rounded bg-[#e8efe7] text-[#3e6c43]">SSE 已连接</span></div>
        <div class="flex items-center gap-2"><button class="h-9 w-9 rounded border border-[#d7d8d1] grid place-items-center"><i data-lucide="bell" class="w-4"></i></button><button class="h-9 px-3 rounded bg-[#20231f] text-white text-sm">创建设备模板</button></div>
      </header>
      <div class="p-5">
        <section class="grid grid-cols-[1fr_1fr_1fr_1.25fr] gap-3 mb-4">
          <div class="panel bg-white rounded p-4"><div class="text-xs text-slate-500">网关在线率</div><div class="mt-2 text-3xl font-bold">84%</div><div class="mt-3 flex gap-1"> <span class="h-2 flex-1 rounded bg-[#3e6c43]"></span><span class="h-2 flex-1 rounded bg-[#3e6c43]"></span><span class="h-2 flex-1 rounded bg-[#ef6c22]"></span></div></div>
          <div class="panel bg-white rounded p-4"><div class="text-xs text-slate-500">模型版本</div><div class="mt-2 text-3xl font-bold">126</div><div class="mt-3 text-xs text-slate-500">今日新增 8 个版本</div></div>
          <div class="panel bg-white rounded p-4"><div class="text-xs text-slate-500">下发成功率</div><div class="mt-2 text-3xl font-bold">96.4%</div><div class="mt-3 text-xs text-[#3e6c43]">最近 24 小时</div></div>
          <div class="panel bg-[#20231f] text-white rounded p-4"><div class="flex justify-between text-xs text-white/55"><span>当前阻塞</span><span>3 项</span></div><div class="mt-3 text-sm">南站能耗网关认证失败</div><button class="mt-4 h-8 px-3 rounded bg-[#ef6c22] text-sm">查看原因</button></div>
        </section>
        <section class="grid grid-cols-[1.1fr_.9fr] gap-4">
          <div class="panel bg-white rounded p-4">
            <div class="flex items-center justify-between mb-3"><h2 class="font-semibold">网关拓扑与健康度</h2><div class="flex text-xs border border-[#d7d8d1] rounded overflow-hidden"><button class="px-3 py-1 bg-[#20231f] text-white">分组</button><button class="px-3 py-1">协议</button></div></div>
            <div class="grid grid-cols-3 gap-3 text-sm">
              <div class="rounded border border-[#d7d8d1] p-3 bg-[#fafaf8]"><div class="flex justify-between"><b>华东工厂</b><span class="text-[#3e6c43]">18/20</span></div><div id="chartA" class="h-[150px]"></div></div>
              <div class="rounded border border-[#d7d8d1] p-3 bg-[#fafaf8]"><div class="flex justify-between"><b>西区冷站</b><span class="text-[#ef6c22]">9/12</span></div><div id="chartB" class="h-[150px]"></div></div>
              <div class="rounded border border-[#d7d8d1] p-3 bg-[#fafaf8]"><div class="flex justify-between"><b>南站能耗</b><span class="text-red-600">5/8</span></div><div id="chartC" class="h-[150px]"></div></div>
            </div>
          </div>
          <div class="panel bg-white rounded p-4">
            <div class="flex items-center justify-between mb-3"><h2 class="font-semibold">设备实例变更</h2><button class="text-sm text-[#ef6c22]">批量下发</button></div>
            <table class="w-full text-sm"><thead class="text-left text-xs text-slate-500"><tr><th class="py-2">实例</th><th>协议</th><th>状态</th></tr></thead><tbody class="divide-y divide-[#ecece8]"><tr><td class="py-3">Boiler-PT-01</td><td>Modbus</td><td><span class="text-[#ef6c22]">待下发</span></td></tr><tr><td class="py-3">Line7-S7-PLC</td><td>S7</td><td><span class="text-[#3e6c43]">同步</span></td></tr><tr><td class="py-3">Energy-MQTT-03</td><td>MQTT</td><td><span class="text-red-600">失败</span></td></tr></tbody></table>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script>
    lucide.createIcons();
    ['chartA','chartB','chartC'].forEach((id, i) => echarts.init(document.getElementById(id)).setOption({series:[{type:'gauge',startAngle:210,endAngle:-30,min:0,max:100,progress:{show:true,width:8,itemStyle:{color:i===0?'#3e6c43':i===1?'#ef6c22':'#dc2626'}},axisLine:{lineStyle:{width:8,color:[[1,'#e4e4dc']]}},axisTick:{show:false},splitLine:{show:false},axisLabel:{show:false},pointer:{show:false},detail:{valueAnimation:true,fontSize:24,offsetCenter:[0,'12%'],formatter:'{value}%'},data:[{value:[91,72,58][i]}]}]}));
  </script>
</body>
</html>
