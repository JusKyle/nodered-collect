version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: collecting-system-postgres
    environment:
      POSTGRES_DB: collecting_system
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: collecting-system-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  emqx:
    image: emqx:5
    container_name: collecting-system-emqx
    environment:
      EMQX_LISTENER__TCP__DEFAULT__BIND: "0.0.0.0:1883"
      EMQX_LISTENER__WS__DEFAULT__BIND: "0.0.0.0:8083"
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: deployment/docker/backend/Dockerfile
    container_name: collecting-system-backend
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/collecting_system?schema=public
      REDIS_URL: redis://redis:6379
      MQTT_HOST: emqx
      MQTT_PORT: 1883
      JWT_SECRET: your-jwt-secret-key
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - emqx
    restart: unless-stopped

  nodered:
    image: nodered/node-red:latest
    container_name: collecting-system-nodered
    environment:
      - TZ=Asia/Shanghai
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      - emqx
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/frontend/Dockerfile
    container_name: collecting-system-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  emqx_data:
  emqx_log:
  nodered_data:
