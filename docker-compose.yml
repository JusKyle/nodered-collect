version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-collect
    environment:
      POSTGRES_DB: collecting_system
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis-collect
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data

  emqx:
    image: emqx/emqx:latest
    container_name: emqx-collect
    environment:
      EMQX_LISTENER__TCP__DEFAULT__BIND: "0.0.0.0:1883"
    ports:
      - "1884:1883"
      - "18084:18083"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log

  nodered:
    image: nodered/node-red:latest
    container_name: nodered-collect
    environment:
      - TZ=Asia/Shanghai
      - MQTT_HOST=emqx
      - MQTT_PORT=1883
    ports:
      - "1888:1880"
    volumes:
      - nodered_data:/data
    depends_on:
      - emqx

  backend:
    build:
      context: .
      dockerfile: deployment/docker/backend/Dockerfile
    container_name: backend-collect
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/collecting_system?schema=public
      REDIS_URL: redis://redis:6379
      MQTT_HOST: emqx
      MQTT_PORT: 1883
      JWT_SECRET: your-jwt-secret-key
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - emqx


  frontend:
    build:
      context: .
      dockerfile: deployment/docker/frontend/Dockerfile
    container_name: frontend-collect
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  emqx_data:
  emqx_log:
  nodered_data:
